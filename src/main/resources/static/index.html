<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI健康飲食管理系統</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍎 AI健康飲食管理系統</h1>
            <p>使用AI技術分析您的飲食健康程度</p>
        </header>

        <main>
            <section class="input-section">
                <h2>分析您的餐食</h2>
                <div class="input-group">
                    <textarea id="mealInput" placeholder="請描述您的餐食，例如：早餐吃了一碗白粥配榨菜，喝了一杯黑咖啡" rows="4"></textarea>
                    <button id="analyzeBtn" class="btn btn-primary">分析餐食</button>
                </div>
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>正在分析中...</p>
                </div>
            </section>

            <section class="results-section" id="resultsSection" style="display: none;">
                <h2>分析結果</h2>
                <div class="result-card">
                    <div class="result-header">
                        <h3 id="resultMealName"></h3>
                        <div class="health-score">
                            <span>健康評分：</span>
                            <div class="score-bar">
                                <div id="scoreBar" class="score-fill"></div>
                            </div>
                            <span id="scoreValue">0/10</span>
                        </div>
                    </div>
                    
                    <div class="result-body">
                        <div class="result-item">
                            <h4>📊 營養分析</h4>
                            <p id="resultNutritionAnalysis"></p>
                        </div>
                        
                        <div class="result-item">
                            <h4>✅ 改進建議</h4>
                            <p id="resultRecommendations"></p>
                        </div>
                        
                        <div class="result-item">
                            <h4>🥘 主要成分</h4>
                            <div id="resultIngredients" class="ingredients-list"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="history-section">
                <h2>分析歷史</h2>
                <div id="historyContainer" class="history-container">
                    <p class="empty-message">暫無歷史記錄</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 AI Health Diet Management. 由 Gemini API 提供智慧分析</p>
        </footer>
    </div>

    <script src="/js/script.js"></script>
</body>
</html>
